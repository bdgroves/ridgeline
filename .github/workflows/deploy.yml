name: RIDGELINE — Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.41.4
          cache: false

      - name: Ingest raw data
        run: pixi run ingest

      - name: Clean & normalize
        run: pixi run clean

      - name: Statistical analysis
        run: pixi run stats

      - name: WUI model
        run: pixi run model

      - name: Fetch GIS data
        run: pixi run gis

      - name: Build interactive map
        run: pixi run map

      - name: Build site
        run: pixi run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
