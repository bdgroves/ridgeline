[project]
name = "ridgeline"
description = "SAR call volume analysis at the wildland-urban interface — Arizona"
version = "0.2.0"
authors = ["Brooks"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[tasks]
# ── Data pipeline ──────────────────────────────────────────────────────────
ingest    = "python src/ingest/fetch_nsar.py"
clean     = "python src/ingest/clean_incidents.py"
pipeline  = { depends-on = ["ingest", "clean"] }

# ── Analysis ───────────────────────────────────────────────────────────────
stats     = "python src/analysis/sar_stats.py"
model     = "python src/analysis/wui_model.py"
weather   = "python src/analysis/weather_pull.py"
analyze   = { depends-on = ["stats", "model"] }

# ── Site ───────────────────────────────────────────────────────────────────
build     = "python src/viz/build_site.py"
serve     = "python -m http.server 8080 --directory site"
deploy    = { depends-on = ["pipeline", "analyze", "build"] }

# ── Dev ────────────────────────────────────────────────────────────────────
notebook  = "jupyter lab notebooks/"
lint      = "ruff check src/"
fmt       = "ruff format src/"
test      = "pytest tests/ -v"

[dependencies]
# ── Core ───────────────────────────────────────────────────────────────────
python         = ">=3.11"
pandas         = ">=2.2"
numpy          = ">=1.26"
pyarrow        = ">=15.0"
httpx          = ">=0.27"
pyyaml         = ">=6.0"
rich           = ">=13.0"
typer          = ">=0.12"
python-dotenv  = ">=1.0"

# ── Geo / spatial ──────────────────────────────────────────────────────────
geopandas      = ">=0.14"
shapely        = ">=2.0"
pyproj         = ">=3.6"
fiona          = ">=1.9"
folium         = ">=0.16"

# ── Visualization ──────────────────────────────────────────────────────────
matplotlib     = ">=3.8"
seaborn        = ">=0.13"
plotly         = ">=5.22"
jinja2         = ">=3.1"
kaleido        = ">=0.2"       # plotly static image export

# ── Analysis / stats ───────────────────────────────────────────────────────
scipy          = ">=1.13"
statsmodels    = ">=0.14"
scikit-learn   = ">=1.4"

# ── Jupyter ────────────────────────────────────────────────────────────────
jupyterlab     = ">=4.0"
ipykernel      = ">=6.0"

# ── Dev ────────────────────────────────────────────────────────────────────
ruff           = ">=0.4"

[feature.dev.dependencies]
pytest         = ">=8.0"
pre-commit     = ">=3.7"
